<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Briefings | INTEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .briefing-content h2 { font-weight: 600; margin-top: 1rem; }
        .briefing-content ul { list-style: disc; margin-left: 1.5rem; }
        .briefing-content li { margin: 0.25rem 0; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b">
        <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="/" class="text-gray-500 hover:text-gray-700">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </a>
                <h1 class="text-xl font-bold text-gray-800">Briefings</h1>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-6 space-y-6">
        <!-- Precisam Briefing -->
        <div class="bg-white rounded-xl shadow-sm border p-4">
            <h2 class="font-semibold text-gray-800 mb-4 flex items-center gap-2">
                <i data-lucide="users" class="w-5 h-5 text-blue-500"></i>
                Contatos que Precisam Briefing
            </h2>
            <div class="space-y-3" id="pendingList">
                <p class="text-gray-500 text-sm">Carregando...</p>
            </div>
        </div>

        <!-- Gerar Briefing Manual -->
        <div class="bg-white rounded-xl shadow-sm border p-4">
            <h2 class="font-semibold text-gray-800 mb-4 flex items-center gap-2">
                <i data-lucide="file-text" class="w-5 h-5 text-green-500"></i>
                Gerar Briefing
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Buscar Contato</label>
                    <input type="text" id="searchContact" placeholder="Digite o nome..."
                           class="w-full border rounded-lg px-3 py-2"
                           onkeyup="searchContacts(this.value)">
                    <div id="searchResults" class="mt-2 space-y-1 hidden"></div>
                </div>
                <div id="selectedContact" class="hidden">
                    <div class="flex items-center gap-3 p-3 bg-blue-50 rounded-lg">
                        <div id="contactAvatar" class="w-10 h-10 rounded-full bg-blue-200 flex items-center justify-center text-blue-700 font-medium"></div>
                        <div>
                            <div id="contactName" class="font-medium"></div>
                            <div id="contactInfo" class="text-sm text-gray-500"></div>
                        </div>
                        <button onclick="clearContact()" class="ml-auto text-gray-400 hover:text-gray-600">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Contexto (opcional)</label>
                    <input type="text" id="contexto" placeholder="Ex: Reuniao de conselho"
                           class="w-full border rounded-lg px-3 py-2">
                </div>
                <button onclick="generateBriefing()" id="generateBtn"
                        class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 disabled:opacity-50"
                        disabled>
                    <i data-lucide="sparkles" class="w-4 h-4 inline mr-2"></i>
                    Gerar Briefing
                </button>
            </div>
        </div>

        <!-- Briefing Result -->
        <div id="briefingResult" class="hidden">
            <div class="bg-white rounded-xl shadow-sm border p-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="font-semibold text-gray-800 flex items-center gap-2">
                        <i data-lucide="file-text" class="w-5 h-5 text-purple-500"></i>
                        <span id="briefingTitle">Briefing</span>
                    </h2>
                    <div class="flex items-center gap-2">
                        <span id="briefingCirculo" class="text-sm px-2 py-1 rounded-full"></span>
                        <span id="briefingHealth" class="text-sm"></span>
                    </div>
                </div>
                <div id="briefingContent" class="briefing-content prose prose-sm max-w-none">
                </div>
                <!-- Meta -->
                <div class="mt-4 pt-4 border-t text-sm text-gray-500">
                    <span id="briefingMeta"></span>
                </div>

                <!-- Action Buttons -->
                <div class="mt-4 pt-4 border-t">
                    <h3 class="text-sm font-medium text-gray-700 mb-3">Acoes</h3>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
                        <button onclick="openCreateTaskModal()" class="flex items-center justify-center gap-2 px-3 py-2 bg-blue-50 text-blue-700 rounded-lg hover:bg-blue-100 transition">
                            <i data-lucide="check-square" class="w-4 h-4"></i>
                            <span class="text-sm">Criar Tarefa</span>
                        </button>
                        <button onclick="openScheduleModal()" class="flex items-center justify-center gap-2 px-3 py-2 bg-green-50 text-green-700 rounded-lg hover:bg-green-100 transition">
                            <i data-lucide="calendar-plus" class="w-4 h-4"></i>
                            <span class="text-sm">Agendar</span>
                        </button>
                        <button onclick="generateEmailDraft()" class="flex items-center justify-center gap-2 px-3 py-2 bg-purple-50 text-purple-700 rounded-lg hover:bg-purple-100 transition">
                            <i data-lucide="mail" class="w-4 h-4"></i>
                            <span class="text-sm">Email</span>
                        </button>
                        <button onclick="openWhatsAppAction()" class="flex items-center justify-center gap-2 px-3 py-2 bg-emerald-50 text-emerald-700 rounded-lg hover:bg-emerald-100 transition">
                            <i data-lucide="message-circle" class="w-4 h-4"></i>
                            <span class="text-sm">WhatsApp</span>
                        </button>
                    </div>
                    <div class="mt-3 flex justify-end">
                        <button onclick="copyBriefing()" class="text-gray-500 hover:text-gray-700 text-sm">
                            <i data-lucide="copy" class="w-4 h-4 inline mr-1"></i>
                            Copiar Texto
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Create Task Modal -->
        <div id="taskModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white rounded-xl shadow-xl max-w-md w-full mx-4 p-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-semibold text-gray-800">Criar Tarefa</h3>
                    <button onclick="closeTaskModal()" class="text-gray-400 hover:text-gray-600">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Titulo</label>
                        <input type="text" id="taskTitle" class="w-full border rounded-lg px-3 py-2" placeholder="Ex: Follow-up com contato">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Data</label>
                        <input type="date" id="taskDate" class="w-full border rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Notas</label>
                        <textarea id="taskNotes" class="w-full border rounded-lg px-3 py-2" rows="3" placeholder="Notas adicionais..."></textarea>
                    </div>
                    <button onclick="createTask()" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
                        Criar Tarefa
                    </button>
                </div>
            </div>
        </div>

        <!-- Schedule Meeting Modal -->
        <div id="scheduleModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white rounded-xl shadow-xl max-w-md w-full mx-4 p-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-semibold text-gray-800">Agendar Reuniao</h3>
                    <button onclick="closeScheduleModal()" class="text-gray-400 hover:text-gray-600">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Titulo</label>
                        <input type="text" id="meetingTitle" class="w-full border rounded-lg px-3 py-2" placeholder="Ex: Reuniao de alinhamento">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">Data</label>
                            <input type="date" id="meetingDate" class="w-full border rounded-lg px-3 py-2">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">Hora</label>
                            <input type="time" id="meetingTime" class="w-full border rounded-lg px-3 py-2" value="10:00">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Notas</label>
                        <textarea id="meetingNotes" class="w-full border rounded-lg px-3 py-2" rows="2" placeholder="Pauta ou contexto..."></textarea>
                    </div>
                    <button onclick="scheduleMeeting()" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700">
                        Agendar Reuniao
                    </button>
                </div>
            </div>
        </div>

        <!-- Email Draft Modal -->
        <div id="emailModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white rounded-xl shadow-xl max-w-lg w-full mx-4 p-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-semibold text-gray-800">Rascunho de Email</h3>
                    <button onclick="closeEmailModal()" class="text-gray-400 hover:text-gray-600">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Assunto</label>
                        <input type="text" id="emailSubject" class="w-full border rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Mensagem</label>
                        <textarea id="emailBody" class="w-full border rounded-lg px-3 py-2" rows="8"></textarea>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="copyEmail()" class="flex-1 bg-gray-100 text-gray-700 py-2 rounded-lg hover:bg-gray-200">
                            <i data-lucide="copy" class="w-4 h-4 inline mr-1"></i> Copiar
                        </button>
                        <button onclick="openMailClient()" class="flex-1 bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700">
                            <i data-lucide="send" class="w-4 h-4 inline mr-1"></i> Abrir Email
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- WhatsApp Modal -->
        <div id="whatsappModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white rounded-xl shadow-xl max-w-md w-full mx-4 p-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-semibold text-gray-800">Enviar WhatsApp</h3>
                    <button onclick="closeWhatsAppModal()" class="text-gray-400 hover:text-gray-600">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Mensagem</label>
                        <textarea id="whatsappMessage" class="w-full border rounded-lg px-3 py-2" rows="5" placeholder="Digite sua mensagem..."></textarea>
                    </div>
                    <div class="text-sm text-gray-500">
                        <span id="whatsappPhone">-</span>
                    </div>
                    <button onclick="sendWhatsApp()" class="w-full py-2 rounded-lg text-white" style="background-color: #25D366;">
                        <i data-lucide="send" class="w-4 h-4 inline mr-1"></i> Abrir WhatsApp
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let selectedContactId = null;
        let currentBriefing = null;

        async function loadPending() {
            try {
                const response = await fetch('/api/briefings/pending?limit=10');
                const data = await response.json();
                renderPending(data);
            } catch (error) {
                console.error('Erro ao carregar pendentes:', error);
                document.getElementById('pendingList').innerHTML =
                    '<p class="text-red-500 text-sm">Erro ao carregar contatos</p>';
            }
        }

        function renderPending(contacts) {
            const container = document.getElementById('pendingList');
            if (!contacts || contacts.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-sm">Nenhum contato precisa de briefing urgente</p>';
                return;
            }

            container.innerHTML = contacts.map(c => `
                <div class="flex items-center gap-3 p-3 hover:bg-gray-50 rounded-lg cursor-pointer"
                     onclick="selectContact(${c.id}, '${escapeHtml(c.nome)}', '${escapeHtml(c.empresa || '')}')">
                    <div class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center font-medium">
                        ${c.nome.charAt(0)}
                    </div>
                    <div class="flex-1">
                        <div class="font-medium">${escapeHtml(c.nome)}</div>
                        <div class="text-sm text-gray-500">${escapeHtml(c.razao || '')}</div>
                    </div>
                    <span class="text-xs px-2 py-1 rounded-full ${c.prioridade === 'alta' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700'}">
                        ${c.prioridade || 'media'}
                    </span>
                </div>
            `).join('');
        }

        async function searchContacts(query) {
            if (query.length < 2) {
                document.getElementById('searchResults').classList.add('hidden');
                return;
            }

            try {
                const response = await fetch(`/api/contacts?search=${encodeURIComponent(query)}&limit=5`);
                const contacts = await response.json();

                const container = document.getElementById('searchResults');
                container.classList.remove('hidden');

                if (!contacts || contacts.length === 0) {
                    container.innerHTML = '<p class="text-gray-500 text-sm p-2">Nenhum contato encontrado</p>';
                    return;
                }

                container.innerHTML = contacts.map(c => `
                    <div class="p-2 hover:bg-gray-100 rounded cursor-pointer"
                         onclick="selectContact(${c.id}, '${escapeHtml(c.nome)}', '${escapeHtml(c.empresa || '')}')">
                        <span class="font-medium">${escapeHtml(c.nome)}</span>
                        ${c.empresa ? `<span class="text-gray-500 text-sm"> - ${escapeHtml(c.empresa)}</span>` : ''}
                    </div>
                `).join('');
            } catch (error) {
                console.error('Erro na busca:', error);
            }
        }

        function selectContact(id, nome, empresa) {
            selectedContactId = id;
            document.getElementById('searchContact').value = '';
            document.getElementById('searchResults').classList.add('hidden');
            document.getElementById('selectedContact').classList.remove('hidden');
            document.getElementById('contactName').textContent = nome;
            document.getElementById('contactInfo').textContent = empresa;
            document.getElementById('contactAvatar').textContent = nome.charAt(0);
            document.getElementById('generateBtn').disabled = false;
            lucide.createIcons();
        }

        function clearContact() {
            selectedContactId = null;
            document.getElementById('selectedContact').classList.add('hidden');
            document.getElementById('generateBtn').disabled = true;
        }

        async function generateBriefing() {
            if (!selectedContactId) return;

            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" class="w-4 h-4 inline mr-2 animate-spin"></i> Gerando...';
            lucide.createIcons();

            try {
                const contexto = document.getElementById('contexto').value;
                const response = await fetch(`/api/contacts/${selectedContactId}/briefing`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contexto: contexto || null })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Erro ao gerar briefing');
                }

                const data = await response.json();
                currentBriefing = data;
                renderBriefing(data);

            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao gerar briefing: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="sparkles" class="w-4 h-4 inline mr-2"></i> Gerar Briefing';
                lucide.createIcons();
            }
        }

        function renderBriefing(data) {
            document.getElementById('briefingResult').classList.remove('hidden');
            document.getElementById('briefingTitle').textContent = `Briefing: ${data.nome || 'Contato'}`;

            // Circulo badge
            const circuloBadge = document.getElementById('briefingCirculo');
            const circulo = data.circulo || 5;
            const cores = {
                1: 'bg-red-100 text-red-700',
                2: 'bg-teal-100 text-teal-700',
                3: 'bg-blue-100 text-blue-700',
                4: 'bg-green-100 text-green-700',
                5: 'bg-purple-100 text-purple-700'
            };
            circuloBadge.className = `text-sm px-2 py-1 rounded-full ${cores[circulo]}`;
            circuloBadge.textContent = `Circulo ${circulo}`;

            // Health
            const health = data.health_score || 50;
            document.getElementById('briefingHealth').textContent = `Health: ${health}%`;

            // Content (convert markdown-ish to HTML)
            let content = data.briefing || '';
            content = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            content = content.replace(/^- /gm, '&bull; ');
            content = content.replace(/\n\n/g, '</p><p class="mt-3">');
            content = content.replace(/\n/g, '<br>');
            content = '<p>' + content + '</p>';
            document.getElementById('briefingContent').innerHTML = content;

            // Meta
            const dias = data.dias_sem_contato;
            document.getElementById('briefingMeta').textContent =
                `Ultimo contato: ${dias !== null && dias !== undefined ? dias + ' dias atras' : 'desconhecido'} | Gerado: agora`;

            // Scroll to result
            document.getElementById('briefingResult').scrollIntoView({ behavior: 'smooth' });
            lucide.createIcons();
        }

        function copyBriefing() {
            if (!currentBriefing || !currentBriefing.briefing) return;
            navigator.clipboard.writeText(currentBriefing.briefing);
            alert('Briefing copiado!');
        }

        // ============== Action Functions ==============

        // Task Modal
        function openCreateTaskModal() {
            if (!currentBriefing) return;
            document.getElementById('taskTitle').value = `Follow-up com ${currentBriefing.nome}`;
            document.getElementById('taskDate').valueAsDate = new Date(Date.now() + 2 * 24 * 60 * 60 * 1000); // +2 days
            document.getElementById('taskNotes').value = `Baseado no briefing gerado.\n\nContexto: ${currentBriefing.briefing?.substring(0, 200)}...`;
            document.getElementById('taskModal').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeTaskModal() {
            document.getElementById('taskModal').classList.add('hidden');
        }

        async function createTask() {
            const title = document.getElementById('taskTitle').value;
            const date = document.getElementById('taskDate').value;
            const notes = document.getElementById('taskNotes').value;

            if (!title || !date) {
                alert('Preencha titulo e data');
                return;
            }

            try {
                const response = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: title,
                        due_date: date,
                        notes: notes,
                        contact_id: selectedContactId,
                        status: 'pending'
                    })
                });

                if (response.ok) {
                    alert('Tarefa criada com sucesso!');
                    closeTaskModal();
                } else {
                    // Fallback: save to localStorage
                    const tasks = JSON.parse(localStorage.getItem('intel_tasks') || '[]');
                    tasks.push({ title, date, notes, contact_id: selectedContactId, created_at: new Date().toISOString() });
                    localStorage.setItem('intel_tasks', JSON.stringify(tasks));
                    alert('Tarefa salva localmente!');
                    closeTaskModal();
                }
            } catch (error) {
                // Fallback: save to localStorage
                const tasks = JSON.parse(localStorage.getItem('intel_tasks') || '[]');
                tasks.push({ title, date, notes, contact_id: selectedContactId, created_at: new Date().toISOString() });
                localStorage.setItem('intel_tasks', JSON.stringify(tasks));
                alert('Tarefa salva localmente!');
                closeTaskModal();
            }
        }

        // Schedule Meeting Modal
        function openScheduleModal() {
            if (!currentBriefing) return;
            document.getElementById('meetingTitle').value = `Reuniao com ${currentBriefing.nome}`;
            document.getElementById('meetingDate').valueAsDate = new Date(Date.now() + 3 * 24 * 60 * 60 * 1000); // +3 days
            document.getElementById('meetingNotes').value = '';
            document.getElementById('scheduleModal').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeScheduleModal() {
            document.getElementById('scheduleModal').classList.add('hidden');
        }

        async function scheduleMeeting() {
            const title = document.getElementById('meetingTitle').value;
            const date = document.getElementById('meetingDate').value;
            const time = document.getElementById('meetingTime').value;
            const notes = document.getElementById('meetingNotes').value;

            if (!title || !date) {
                alert('Preencha titulo e data');
                return;
            }

            const startDatetime = `${date}T${time}:00`;

            try {
                const response = await fetch('/api/calendar/events', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        summary: title,
                        start_datetime: startDatetime,
                        contact_id: selectedContactId,
                        contact_name: currentBriefing.nome,
                        description: notes
                    })
                });

                if (response.ok) {
                    alert('Reuniao agendada com sucesso!');
                    closeScheduleModal();
                } else {
                    // Fallback: redirect to calendar
                    window.location.href = `/calendario?new=true&contact_id=${selectedContactId}&contact_name=${encodeURIComponent(currentBriefing.nome)}`;
                }
            } catch (error) {
                // Fallback: redirect to calendar
                window.location.href = `/calendario?new=true&contact_id=${selectedContactId}&contact_name=${encodeURIComponent(currentBriefing.nome)}`;
            }
        }

        // Email Draft
        async function generateEmailDraft() {
            if (!currentBriefing) return;

            document.getElementById('emailModal').classList.remove('hidden');
            document.getElementById('emailSubject').value = 'Carregando...';
            document.getElementById('emailBody').value = 'Gerando rascunho com IA...';
            lucide.createIcons();

            try {
                const response = await fetch(`/api/ai/email-draft`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contact_id: selectedContactId,
                        briefing: currentBriefing.briefing,
                        contact_name: currentBriefing.nome
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('emailSubject').value = data.subject || `Oi ${currentBriefing.nome?.split(' ')[0]}`;
                    document.getElementById('emailBody').value = data.body || '';
                } else {
                    // Fallback: generate simple draft
                    const firstName = currentBriefing.nome?.split(' ')[0] || 'Voce';
                    document.getElementById('emailSubject').value = `Oi ${firstName}`;
                    document.getElementById('emailBody').value = `Oi ${firstName},\n\nEspero que esteja tudo bem!\n\n[Sua mensagem aqui]\n\nAbraco,\nRenato`;
                }
            } catch (error) {
                // Fallback
                const firstName = currentBriefing.nome?.split(' ')[0] || 'Voce';
                document.getElementById('emailSubject').value = `Oi ${firstName}`;
                document.getElementById('emailBody').value = `Oi ${firstName},\n\nEspero que esteja tudo bem!\n\n[Sua mensagem aqui]\n\nAbraco,\nRenato`;
            }
        }

        function closeEmailModal() {
            document.getElementById('emailModal').classList.add('hidden');
        }

        function copyEmail() {
            const subject = document.getElementById('emailSubject').value;
            const body = document.getElementById('emailBody').value;
            navigator.clipboard.writeText(`Assunto: ${subject}\n\n${body}`);
            alert('Email copiado!');
        }

        function openMailClient() {
            const subject = encodeURIComponent(document.getElementById('emailSubject').value);
            const body = encodeURIComponent(document.getElementById('emailBody').value);
            // Try to get email from current briefing data
            const email = currentBriefing.email || '';
            window.open(`mailto:${email}?subject=${subject}&body=${body}`, '_blank');
            closeEmailModal();
        }

        // WhatsApp
        function openWhatsAppAction() {
            if (!currentBriefing) return;

            const firstName = currentBriefing.nome?.split(' ')[0] || '';
            document.getElementById('whatsappMessage').value = `Oi ${firstName}! Tudo bem?\n\n`;
            document.getElementById('whatsappPhone').textContent = currentBriefing.telefone || 'Telefone nao disponivel';
            document.getElementById('whatsappModal').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeWhatsAppModal() {
            document.getElementById('whatsappModal').classList.add('hidden');
        }

        function sendWhatsApp() {
            const message = document.getElementById('whatsappMessage').value;
            const phone = currentBriefing.telefone?.replace(/\D/g, '') || '';

            if (!phone) {
                alert('Telefone nao disponivel para este contato');
                return;
            }

            // Format phone for WhatsApp (add country code if missing)
            let formattedPhone = phone;
            if (!formattedPhone.startsWith('55')) {
                formattedPhone = '55' + formattedPhone;
            }

            const url = `https://wa.me/${formattedPhone}?text=${encodeURIComponent(message)}`;
            window.open(url, '_blank');
            closeWhatsAppModal();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;')
                      .replace(/'/g, '&#039;');
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            loadPending();
        });
    </script>
</body>
</html>
