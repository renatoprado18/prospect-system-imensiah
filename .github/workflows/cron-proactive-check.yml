name: Cron — Proactive Check (INTEL bot)

# Why GitHub Actions: Vercel Hobby plan nao aceita schedules sub-diarios.
# Endpoint /api/cron/proactive-check roda 30/30min, detecta sinais
# acionaveis (pos-reuniao, decay, etc) e bot inicia conversa via WA.
# MVP entrega trigger pos-reuniao (#335) — Inteligencia Real P4.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit proactive-check endpoint
        run: |
          response=$(curl -sS -w "\nHTTP_CODE:%{http_code}\n" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://intel.almeida-prado.com/api/cron/proactive-check")
          echo "$response"
          echo "$response" | grep -E "HTTP_CODE:2" || (echo "::error::Endpoint failed" && exit 1)
