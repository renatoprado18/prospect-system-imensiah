name: Cron — Editorial Metrics Reminder

# Why GitHub Actions: Vercel Hobby plan deprioritiza/skipa crons silenciosamente
# (08/05 14 UTC nao disparou, sem 401 sem erro — terceiro incidente do padrao).
# Migrado em 2026-05-09 pra disparo confiavel.

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit editorial-metrics-reminder endpoint
        run: |
          response=$(curl -sS -w "\nHTTP_CODE:%{http_code}\n" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://intel.almeida-prado.com/api/cron/editorial-metrics-reminder")
          echo "$response"
          echo "$response" | grep -E "HTTP_CODE:2" || (echo "::error::Endpoint failed" && exit 1)
