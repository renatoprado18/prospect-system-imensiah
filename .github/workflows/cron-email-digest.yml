name: Cron — Email Digest

# Why GitHub Actions: Vercel Hobby plan deprioritiza/skipa crons silenciosamente
# (caso 2026-05-07 — 21 UTC nao disparou sem 401, sem erro, sem aviso). Migrado
# pra GH Actions em 2026-05-08 pra disparo confiavel.

on:
  # DESLIGADO 11/07/2026 — o digest diário de email virou ruído redundante: a
  # Tônia agora lê o inbox de alta prioridade no briefing das 7h (camada 3 do
  # blind spot de email). Alinhado com a filosofia de notificação (só quando
  # precisa de ação) e com o sunset do gen-1. Mantido workflow_dispatch pra
  # disparo manual se precisar. Reverter = descomentar o schedule abaixo.
  # schedule:
  #   - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit email-digest endpoint
        run: |
          response=$(curl -sS -w "\nHTTP_CODE:%{http_code}\n" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://intel.almeida-prado.com/api/cron/email-digest")
          echo "$response"
          echo "$response" | grep -E "HTTP_CODE:2" || (echo "::error::Endpoint failed" && exit 1)
