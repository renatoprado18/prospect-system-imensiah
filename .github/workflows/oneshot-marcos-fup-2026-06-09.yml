name: One-shot — Marcos Tanaka FUP (Wadhwani) 2026-06-09

# Why: Renato aprovou em 07/06/26 enviar este FUP pro Marcos Tanaka na 2a
# feira (09/06) pela manha. Sem infra de scheduled-sends na INTEL ainda,
# uso GH Actions one-shot: cron fira em qualquer 9-jun, mas o job verifica
# que estamos em 2026 antes de enviar. Apos fire em 09/06/26 me lembro de
# deletar este arquivo (ou faz na proxima sessao).

on:
  schedule:
    - cron: '0 12 9 6 *'   # 12:00 UTC = 09:00 BRT, dia 9 de junho
  workflow_dispatch:        # tambem dispara manualmente pra teste

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Guard — so envia em 2026-06-09
        id: guard
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          if [ "$TODAY" = "2026-06-09" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ok=yes" >> $GITHUB_OUTPUT
          else
            echo "ok=no" >> $GITHUB_OUTPUT
            echo "::warning::Hoje e $TODAY, nao 2026-06-09 — skip"
          fi

      - name: Send WA via Evolution rap-whatsapp
        if: steps.guard.outputs.ok == 'yes'
        env:
          EVOLUTION_API_URL: ${{ secrets.EVOLUTION_API_URL }}
          EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY }}
        run: |
          # URL pode vir com \n no fim — strip defensive (mesmo bug que travou cron 15 dias)
          URL=$(echo -n "$EVOLUTION_API_URL" | tr -d '\\n\\r' | sed 's:/*$::')
          curl -sS -w "\nHTTP_CODE:%{http_code}\n" \
            -X POST "$URL/message/sendText/rap-whatsapp" \
            -H "apikey: $EVOLUTION_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"number":"5524998842022","text":"Marcos, bom dia! Tudo bem? Voce ficou de me mandar o modelo de MOU e a apresentacao da Wadhwani — me ajudaria muito ter esse material pra eu avaliar com calma a entrada como Venture Partner. Quando conseguir separar, manda. Abraco.","delay":300}' \
            | tee /tmp/resp.txt
          grep -E "HTTP_CODE:2" /tmp/resp.txt || (echo "::error::Send failed" && exit 1)

      - name: Skip notice
        if: steps.guard.outputs.ok == 'no'
        run: echo "Skipped — hoje nao e 2026-06-09"
