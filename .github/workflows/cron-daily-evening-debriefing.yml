name: Cron — Daily Evening Debriefing

# Why GitHub Actions: Vercel Hobby plan deprioritiza/skipa crons silenciosamente
# (caso 2026-05-07 — 22 UTC nao disparou sem 401, sem erro, sem aviso). Migrado
# pra GH Actions em 2026-05-08 pra disparo confiavel.

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit daily-evening-debriefing endpoint
        run: |
          response=$(curl -sS -w "\nHTTP_CODE:%{http_code}\n" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://intel.almeida-prado.com/api/cron/daily-evening-debriefing")
          echo "$response"
          echo "$response" | grep -E "HTTP_CODE:2" || (echo "::error::Endpoint failed" && exit 1)
