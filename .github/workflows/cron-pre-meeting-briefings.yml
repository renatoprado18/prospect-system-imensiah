name: Cron — Pre-Meeting Briefings

# Why GitHub Actions: Vercel Hobby plan deprioritiza/skipa crons silenciosamente
# sem aviso. Briefings pre-reuniao precisam disparar antes das reunioes do dia
# (10 UTC = 7h BRT), nao pode falhar. Migrado em 2026-05-08 pra disparo confiavel.

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit pre-meeting-briefings endpoint
        run: |
          response=$(curl -sS -w "\nHTTP_CODE:%{http_code}\n" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://intel.almeida-prado.com/api/cron/pre-meeting-briefings")
          echo "$response"
          echo "$response" | grep -E "HTTP_CODE:2" || (echo "::error::Endpoint failed" && exit 1)
