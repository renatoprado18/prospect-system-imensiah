name: Cron — Daily Morning Briefing

# Why GitHub Actions: Vercel Hobby plan deprioritiza/skipa crons silenciosamente
# sem aviso. Briefing matinal e critico (rotina diaria do usuario), nao pode
# falhar silenciosamente. Migrado em 2026-05-08 pra disparo confiavel.

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit daily-morning-briefing endpoint
        run: |
          response=$(curl -sS -w "\nHTTP_CODE:%{http_code}\n" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://intel.almeida-prado.com/api/cron/daily-morning-briefing")
          echo "$response"
          echo "$response" | grep -E "HTTP_CODE:2" || (echo "::error::Endpoint failed" && exit 1)
