  name: Sync Google Contacts

  on:
    schedule:
      - cron: '0 6 * * 0'
    workflow_dispatch:

  jobs:
    sync:
      runs-on: ubuntu-latest
      timeout-minutes: 30
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: '3.12'
        - run: pip install python-dotenv httpx psycopg2-binary
        - name: Check secrets
          run: |
            if [ -n "$DATABASE_URL" ]; then echo "DATABASE_URL is set"; else echo "DATABASE_URL is NOT set"; fi
            if [ -n "$GOOGLE_CLIENT_ID" ]; then echo "GOOGLE_CLIENT_ID is set"; else echo "GOOGLE_CLIENT_ID is NOT set"; fi
        - name: Run sync
          run: python scripts/sync_google_contacts.py
