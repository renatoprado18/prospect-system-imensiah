name: Cron — Auto Publish LinkedIn

# Why GitHub Actions: Vercel Hobby caps at 1 cron/day per path. Precisamos de
# 2 slots/dia (16h e 21h BRT) pra cobrir o agendamento Thu/Tue/Fri 16h + Tue 21h
# definido em auto_publisher.schedule_selected_posts (PDCA mes 1, 08/05/2026).

on:
  schedule:
    # 19:05 UTC = 16h05 BRT — slot 16h (mais usado)
    # 00:05 UTC = 21h05 BRT — slot 21h (cron roda diario; publish_due_posts
    #            so publica scheduled posts cuja data_publicacao <= now())
    - cron: '5 19 * * *'
    - cron: '5 0 * * *'
  workflow_dispatch:  # botao manual em Actions tab

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit auto-publish-linkedin endpoint
        run: |
          response=$(curl -sS -w "\nHTTP_CODE:%{http_code}\n" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://intel.almeida-prado.com/api/cron/auto-publish-linkedin")
          echo "$response"
          echo "$response" | grep -E "HTTP_CODE:2" || (echo "::error::Endpoint failed" && exit 1)
