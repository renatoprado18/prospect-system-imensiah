name: Cron — WA Triage Sweep

# F3.1 WA window classifier shadow mode (28/06/2026).
# Sweep 4/4h: classifica msgs WhatsApp incoming nao classificadas com janela
# de 5 turnos contexto. Batched Claude Sonnet 4.6 call (prompt cache).
# Output em wa_triage (status=shadow) — nao cria action_proposal ainda.
#
# Hosted em GH Actions (NAO Vercel) porque Hobby plan limita 1 cron/dia.
# Memo feedback_cron_host_choice: GH Actions default pra leve (~30s/run).

on:
  schedule:
    - cron: "0 */4 * * *"  # a cada 4h, top of hour UTC
  workflow_dispatch:
    inputs:
      window_hours:
        description: 'Janela de busca em horas (default 4)'
        required: false
        default: '4'

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Hit wa-triage-sweep endpoint
        run: |
          HOURS="${{ github.event.inputs.window_hours || '4' }}"
          response=$(curl -sS -w "\nHTTP_CODE:%{http_code}\n" \
            --max-time 300 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://intel.almeida-prado.com/api/cron/wa-triage-sweep?window_hours=${HOURS}")
          echo "$response"
          echo "$response" | grep -E "HTTP_CODE:2" || (echo "::error::Endpoint failed" && exit 1)
