name: Cron — Social Groups Cache (paginated)

# Why GitHub Actions: Vercel Hobby plan rejeita schedules sub-diarios.
# Endpoint /api/cron/run-social-groups processa BATCH grupos por execucao
# via cron_cursors. Hourly trigger acelera cobertura: 108 grupos / 30 batch
# = ~4 runs pra primeira passada (vs 4 dias com cron diario do Vercel).

on:
  schedule:
    - cron: '20 * * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit run-social-groups endpoint
        run: |
          response=$(curl -sS -w "\nHTTP_CODE:%{http_code}\n" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://intel.almeida-prado.com/api/cron/run-social-groups")
          echo "$response"
          echo "$response" | grep -E "HTTP_CODE:2" || (echo "::error::Endpoint failed" && exit 1)
